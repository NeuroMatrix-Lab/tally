name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set Version
        id: set_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag_name }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build Android Release
        run: |
          flutter build apk --release --no-tree-shake-icons
          flutter build appbundle --release --no-tree-shake-icons
      
      - name: List Android build outputs
        run: find build/app/outputs -type f
      
      - name: Rename APK
        run: |
          VERSION="${{ steps.set_version.outputs.version }}"
          echo "Renaming APK with version: $VERSION"
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/tally-${VERSION}-android.apk
            echo "APK renamed successfully"
          else
            echo "ERROR: APK file not found!"
            exit 1
          fi
      
      - name: Rename AppBundle
        run: |
          VERSION="${{ steps.set_version.outputs.version }}"
          echo "Renaming AppBundle with version: $VERSION"
          if [ -f build/app/outputs/bundle/release/app-release.aab ]; then
            mv build/app/outputs/bundle/release/app-release.aab build/app/outputs/bundle/release/tally-${VERSION}-android.aab
            echo "AppBundle renamed successfully"
          else
            echo "ERROR: AppBundle file not found!"
            exit 1
          fi
      
      - name: List renamed files
        run: |
          echo "=== APK files ==="
          find build/app/outputs -name "tally-*.apk"
          echo "=== AAB files ==="
          find build/app/outputs -name "tally-*.aab"
      
      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            build/app/outputs/flutter-apk/tally-*.apk
            build/app/outputs/bundle/release/tally-*.aab
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set Version
        id: set_version
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $VERSION = "${{ github.event.inputs.tag_name }}"
          } else {
            $VERSION = "${{ github.ref_name }}"
          }
          Write-Host "version=$VERSION" >> $env:GITHUB_OUTPUT
          Write-Host "Using version: $VERSION"
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build Windows Release
        run: flutter build windows --release
      
      - name: List Windows build outputs
        run: Get-ChildItem -Path build\windows\x64\runner\Release -Recurse -File
      
      - name: Create Windows Zip
        run: |
          $version = "${{ steps.set_version.outputs.version }}"
          $zipName = "tally-${version}-windows.zip"
          Write-Host "Creating zip: $zipName"
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath build\windows\$zipName
      
      - name: List Windows zip file
        run: Get-ChildItem -Path build\windows -Name "tally-*.zip"
      
      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: build/windows/tally-*.zip
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set Version
        id: set_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag_name }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build macOS Release
        run: flutter build macos --release
      
      - name: List macOS build outputs
        run: find build/macos/Build/Products/Release -type f
      
      - name: Create macOS DMG
        run: |
          version="${{ steps.set_version.outputs.version }}"
          echo "Using version: $version"
          app_path="build/macos/Build/Products/Release/tally.app"
          dmg_path="build/macos/tally-${version}-macos.dmg"
          echo "Creating DMG: $dmg_path"
          hdiutil create -srcfolder "$app_path" -volname "Tally" -fs HFS+ -format UDZO "$dmg_path"
      
      - name: List macOS DMG file
        run: ls -la build/macos/tally-*.dmg
      
      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: build/macos/tally-*.dmg
          if-no-files-found: error

  release:
    needs: [build-android, build-windows, build-macos]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set Version
        id: set_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag_name }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"
      
      - name: Create build directories
        run: |
          mkdir -p builds/android
          mkdir -p builds/windows
          mkdir -p builds/macos
      
      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-builds
          path: builds/android
      
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: builds/windows
      
      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-builds
          path: builds/macos
      
      - name: List all downloaded files
        run: |
          echo "=== Android files ==="
          find builds/android -type f -ls
          echo "=== Windows files ==="
          find builds/windows -type f -ls
          echo "=== macOS files ==="
          find builds/macos -type f -ls
      
      - name: Verify Android files exist
        run: |
          if [ -z "$(find builds/android -name '*.apk' -o -name '*.aab')" ]; then
            echo "ERROR: No Android files found!"
            exit 1
          fi
          echo "Android files verified successfully"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.set_version.outputs.version }}
          name: Release ${{ steps.set_version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            builds/android/*
            builds/windows/*
            builds/macos/*
          body: |
            ## What's Changed
            - Automatic build and release
            
            ## Builds
            - Android: APK and AppBundle
            - Windows: Zip archive
            - macOS: DMG installer
