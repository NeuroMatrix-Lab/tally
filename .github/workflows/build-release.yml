name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release'
        required: true
        default: 'v1.0.0'

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build Android Release
        run: |
          flutter build apk --release --no-tree-shake-icons
          flutter build appbundle --release --no-tree-shake-icons
      
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/tally-${{ github.ref_name }}-android.apk
      
      - name: Rename AppBundle
        run: |
          mv build/app/outputs/bundle/release/app-release.aab build/app/outputs/bundle/release/tally-${{ github.ref_name }}-android.aab
      
      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            build/app/outputs/flutter-apk/tally-*.apk
            build/app/outputs/bundle/release/tally-*.aab

  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build Windows Release
        run: flutter build windows --release
      
      - name: Create Windows Zip
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "tally-${version}-windows.zip"
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath build\windows\$zipName
      
      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: build/windows/tally-*.zip

  build-macos:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build macOS Release
        run: flutter build macos --release
      
      - name: Create macOS DMG
        run: |
          version="${{ github.ref_name }}"
          app_path="build/macos/Build/Products/Release/tally.app"
          dmg_path="build/macos/tally-${version}-macos.dmg"
          hdiutil create -srcfolder "$app_path" -volname "Tally" -fs HFS+ -format UDZO "$dmg_path"
      
      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: build/macos/tally-*.dmg

  release:
    needs: [build-android, build-windows, build-macos]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-builds
          path: builds/android
      
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: builds/windows
      
      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-builds
          path: builds/macos
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag_name }}
          name: Release ${{ github.ref_name || github.event.inputs.tag_name }}
          draft: false
          prerelease: false
          files: |
            builds/android/tally-*.apk
            builds/android/tally-*.aab
            builds/windows/tally-*.zip
            builds/macos/tally-*.dmg
          body: |
            ## What's Changed
            - Automatic build and release
            
            ## Builds
            - Android: APK and AppBundle
            - Windows: Zip archive
            - macOS: DMG installer