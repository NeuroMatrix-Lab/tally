name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set Version
        id: set_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag_name }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build Android Release
        run: |
          VERSION="${{ steps.set_version.outputs.version }}"
          # 去掉标签前缀的 'v'，比如 v1.0.0 -> 1.0.0
          BUILD_NAME=$(echo $VERSION | sed 's/^v//')
          # 构建简单的 versionCode，比如 1.0.0 -> 10000
          BUILD_NUMBER=$(echo $BUILD_NAME | awk -F. '{printf("%d%02d%02d", $1, $2, $3)}')
          echo "Building with build-name: $BUILD_NAME, build-number: $BUILD_NUMBER"
          flutter build apk --release --no-tree-shake-icons --build-name=$BUILD_NAME --build-number=$BUILD_NUMBER
          flutter build appbundle --release --no-tree-shake-icons --build-name=$BUILD_NAME --build-number=$BUILD_NUMBER
      
      - name: List Android build outputs
        run: find build/app/outputs -type f
      
      - name: Rename APK
        run: |
          VERSION="${{ steps.set_version.outputs.version }}"
          echo "Renaming APK with version: $VERSION"
          APK_PATH=$(find build/app/outputs/flutter-apk -maxdepth 1 -name '*release*.apk' | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: APK file not found in build/app/outputs/flutter-apk"
            find build/app/outputs/flutter-apk -maxdepth 1 -type f -print
            exit 1
          fi
          TARGET_APK=build/app/outputs/flutter-apk/tally-${VERSION}-android.apk
          mv "$APK_PATH" "$TARGET_APK"
          echo "APK renamed successfully to $TARGET_APK"
      
      - name: Rename AppBundle
        run: |
          VERSION="${{ steps.set_version.outputs.version }}"
          echo "Renaming AppBundle with version: $VERSION"
          AAB_PATH=$(find build/app/outputs/bundle/release -maxdepth 1 -name '*release*.aab' | head -n 1)
          if [ -z "$AAB_PATH" ]; then
            echo "ERROR: AppBundle file not found in build/app/outputs/bundle/release"
            find build/app/outputs/bundle/release -maxdepth 1 -type f -print
            exit 1
          fi
          TARGET_AAB=build/app/outputs/bundle/release/tally-${VERSION}-android.aab
          mv "$AAB_PATH" "$TARGET_AAB"
          echo "AppBundle renamed successfully to $TARGET_AAB"
      
      - name: List renamed files
        run: |
          echo "=== APK files ==="
          find build/app/outputs -name "tally-*.apk"
          echo "=== AAB files ==="
          find build/app/outputs -name "tally-*.aab"
      
      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            build/app/outputs/flutter-apk/tally-*.apk
            build/app/outputs/bundle/release/tally-*.aab
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set Version
        id: set_version
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $VERSION = "${{ github.event.inputs.tag_name }}"
          } else {
            $VERSION = "${{ github.ref_name }}"
          }
          Write-Host "version=$VERSION" >> $env:GITHUB_OUTPUT
          Write-Host "Using version: $VERSION"
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build Windows Release
        run: flutter build windows --release
      
      - name: List Windows build outputs
        run: Get-ChildItem -Path build\windows\x64\runner\Release -Recurse -File
      
      - name: Create Windows Zip
        run: |
          $version = "${{ steps.set_version.outputs.version }}"
          $zipName = "tally-${version}-windows.zip"
          Write-Host "Creating zip: $zipName"
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath build\windows\$zipName
      
      - name: List Windows zip file
        run: Get-ChildItem -Path build\windows -Name "tally-*.zip"
      
      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: build/windows/tally-*.zip
          if-no-files-found: error

  release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set Version
        id: set_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag_name }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"
      
      - name: Create build directories
        run: |
          mkdir -p builds/android
          mkdir -p builds/windows
      
      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-builds
          path: builds/android
      
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: builds/windows
      
      - name: List all downloaded files
        run: |
          echo "=== Android files ==="
          find builds/android -type f -ls
          echo "=== Windows files ==="
          find builds/windows -type f -ls
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.set_version.outputs.version }}
          name: Release ${{ steps.set_version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            builds/android/**
            builds/windows/**
          body: |
            ## What's Changed
            - Automatic build and release
            
            ## Builds
            - Android: APK and AppBundle
            - Windows: Zip archive
